name: CI

# Runs the production build on every PR into main. Pair this with a
# branch-protection rule requiring the "build-and-lint" status check.
#
# Lint is intentionally NOT run here: `next lint` was removed in Next.js 16
# (this repo runs Next 16) and there is no standalone ESLint setup. If ESLint
# is properly configured later, add an `npm run lint` step back.
# The job id stays "build-and-lint" so the required status check keeps matching.

on:
  pull_request:
    branches: [main]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build
