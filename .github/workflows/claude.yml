name: Claude Code

# Automated bug-fix agent. Triggered when someone writes "@claude" in a GitHub
# issue or comment. Behaviour guardrails live in CLAUDE.md (read automatically)
# and .claude/global-bot-rules.md. This workflow only controls *when* it runs.

permissions:
  contents: write
  pull-requests: write
  issues: write

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Only run when "@claude" is actually present, so unrelated issues/comments
    # don't burn API spend.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Cap the run so a confused agent can't loop indefinitely.
          claude_args: "--max-turns 15"
