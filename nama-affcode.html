<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --white: #ffffff; --bg: #f7f7f7; --black: #111;
  --border: #e8e8e8; --label: #aaa; --body: #555; --subtle: #f5f5f5;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'Helvetica Neue', Helvetica, Arial, sans-serif;
}
body { font-family: var(--sans); background: #ddd; -webkit-font-smoothing: antialiased; padding: 48px; display: flex; gap: 32px; flex-wrap: wrap; align-items: flex-start; }
.label { font-size: 11px; color: #999; margin-bottom: 8px; font-family: var(--sans); letter-spacing: 0.06em; }

/* OPTION A — hairline border box, code in serif */
.opt-a {
  background: var(--white); border: 1px solid var(--border);
  padding: 20px 24px; width: 300px;
}
.opt-a-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.opt-a-eyebrow { font-size: 9px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--label); }
.opt-a-code { font-family: var(--serif); font-size: 28px; color: var(--black); letter-spacing: 0.06em; font-weight: 400; }
.opt-a-copy {
  padding: 4px 10px; border: 1px solid var(--border); background: var(--white);
  font-family: var(--sans); font-size: 8.5px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); cursor: pointer; border-radius: 2px;
}
.opt-a-copy:hover { border-color: var(--black); color: var(--black); }

/* OPTION B — stat row style, matches the commission/videos rows */
.opt-b {
  background: var(--white); border: 1px solid var(--border);
  width: 300px;
}
.opt-b-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px; border-bottom: 1px solid var(--border);
}
.opt-b-label { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--label); }
.opt-b-code { font-family: var(--serif); font-size: 20px; color: var(--black); }
.opt-b-actions { display: flex; align-items: center; gap: 10px; padding: 12px 24px; }
.opt-b-copy {
  padding: 7px 16px; background: var(--black); color: white; border: none;
  font-family: var(--sans); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer;
}
.opt-b-share { font-size: 11px; color: var(--label); cursor: pointer; text-decoration: underline; }

/* OPTION C — just type, very quiet */
.opt-c {
  background: var(--white); border: 1px solid var(--border);
  padding: 20px 24px; width: 300px;
}
.opt-c-eyebrow { font-size: 9px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--label); margin-bottom: 6px; }
.opt-c-code { font-family: var(--serif); font-size: 24px; color: var(--black); letter-spacing: 0.08em; margin-bottom: 12px; }
.opt-c-note { font-size: 11px; color: var(--label); font-weight: 300; margin-bottom: 12px; line-height: 1.6; }
.opt-c-copy {
  padding: 8px 0; background: transparent; border: none; border-bottom: 1px solid var(--black);
  font-family: var(--sans); font-size: 9.5px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--black); cursor: pointer; display: inline-block;
}
</style>
</head>
<body>

<div>
  <div class="label">Option A — bordered box</div>
  <div class="opt-a">
    <div class="opt-a-top">
      <div class="opt-a-eyebrow">Your Affiliate Code</div>
      <button class="opt-a-copy">Copy</button>
    </div>
    <div class="opt-a-code">CHARLENELEE</div>
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0;">
        <div>
          <div style="font-size:9px;letter-spacing:0.32em;text-transform:uppercase;color:var(--label);margin-bottom:5px;">Your Link</div>
          <div style="font-size:11px;color:var(--muted);font-weight:300;letter-spacing:0.02em;">namaclo.com/?ref=CHARLENELEE</div>
        </div>
        <button style="padding:4px 10px;border:1px solid var(--border);background:var(--white);font-family:var(--sans);font-size:8.5px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-radius:2px;flex-shrink:0;margin-left:16px;">Copy</button>
      </div>
    </div>
  </div>
</div>

<div>
  <div class="label">Option B — stat row style</div>
  <div class="opt-b">
    <div class="opt-b-row">
      <span class="opt-b-label">Affiliate Code</span>
      <span class="opt-b-code">CHARLENELEE</span>
    </div>
    <div class="opt-b-actions">
      <button class="opt-b-copy">Copy Code</button>
      <span class="opt-b-share">Share link</span>
    </div>
  </div>
</div>

<div>
  <div class="label">Option C — quiet, just type</div>
  <div class="opt-c">
    <div class="opt-c-eyebrow">Your Affiliate Code</div>
    <div class="opt-c-code">CHARLENELEE</div>
    <div class="opt-c-note">Share this code with your audience — you earn 10% on every order it generates.</div>
    <button class="opt-c-copy">Copy Code →</button>
  </div>
</div>

</body>
</html>
